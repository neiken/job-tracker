<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Job Tracker">
<meta name="theme-color" content="#F5F4F0">
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F4F0;--surface:#FFF;--surface2:#F9F8F5;
  --border:#E4E2DC;--border2:#D0CEC6;
  --text:#1A1916;--text2:#6B6860;--text3:#A8A59E;
  --blue:#1B63D4;--blue-bg:#EBF1FD;--blue-bd:#C2D4F7;
  --green:#1A7A4A;--green-bg:#E6F5ED;--green-bd:#B3DECA;
  --amber:#A0580A;--amber-bg:#FEF3E2;--amber-bd:#F5D49A;
  --pink:#C2255C;--pink-bg:#FDEEF4;--pink-bd:#F5B8D0;
  --slate:#4A5568;--slate-bg:#EEF0F3;--slate-bd:#C8CDD6;
  --red:#C0392B;--red-bg:#FDEEEC;--red-bd:#F5C0BA;
  --purple:#6B3FA0;--purple-bg:#F3EFFE;--purple-bd:#D4BAFC;
  --r:8px;--rl:14px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(245,244,240,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:54px;gap:0;}
.nav-brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;color:var(--text);margin-right:28px;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);}
.nav-tabs{display:flex;gap:2px;flex:1;}
.tab-btn{background:none;border:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text3);padding:6px 13px;border-radius:7px;transition:all .14s;white-space:nowrap;}
.tab-btn:hover{color:var(--text2);background:var(--border);}
.tab-btn.active{color:var(--blue);background:var(--blue-bg);}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.nav-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;}
.btn-drive{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all .14s;border:1px solid var(--border2);background:var(--surface);color:var(--text2);}
.btn-drive.connected{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.btn-drive.syncing{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.sync-dot.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── LAYOUT ── */
.main{max-width:1200px;margin:0 auto;padding:24px 20px;}
.page{display:none;}
.page.active{display:block;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;border-radius:var(--r);font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;transition:all .14s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 1px 3px rgba(27,99,212,.3);}
.btn-primary:hover{background:#1554BB;}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-ai{background:linear-gradient(135deg,#EBF1FD,#F0EBF9);color:var(--blue);border:1px solid var(--blue-bd);font-size:12px;padding:5px 11px;border-radius:6px;}
.btn-ai:hover{background:linear-gradient(135deg,#dce8fb,#e5dbf7);}
.btn-adopt{display:inline-flex;align-items:center;gap:5px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd);border-radius:6px;font-size:11px;font-weight:500;padding:4px 10px;cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all .12s;white-space:nowrap;}
.btn-adopt:hover{background:#e8d9fb;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh);}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:7px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.stat-value{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:700;line-height:1;}
.stat-value.blue{color:var(--blue);}.stat-value.green{color:var(--green);}
.stat-value.amber{color:var(--amber);}.stat-value.pink{color:var(--pink);}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.page-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:20px;}
.page-header-right{display:flex;align-items:center;gap:8px;}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.vt-btn{background:none;border:none;cursor:pointer;padding:6px 11px;color:var(--text3);transition:all .12s;font-size:14px;display:flex;align-items:center;}
.vt-btn:hover{color:var(--text2);}
.vt-btn.active{background:var(--blue-bg);color:var(--blue);}

/* ── FILTER ── */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-select,.search-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:12px;padding:7px 11px;transition:border-color .14s;}
.search-input{flex:1;min-width:180px;color:var(--text);}
.search-input::placeholder{color:var(--text3);}
.filter-select:focus,.search-input:focus{outline:none;border-color:var(--blue);}

/* ── CARD GRID ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.company-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh);transition:all .16s;position:relative;overflow:hidden;}
.company-card:hover{box-shadow:var(--shm);border-color:var(--border2);transform:translateY(-1px);}
.company-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.company-card.prio-A::before{background:var(--red);}
.company-card.prio-B::before{background:var(--amber);}
.company-card.prio-C::before{background:var(--border2);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.card-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;line-height:1.3;}
.card-actions{display:flex;gap:5px;opacity:0;transition:opacity .14s;}
.company-card:hover .card-actions{opacity:1;}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text3);cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:11px;padding:3px 8px;transition:all .12s;}
.icon-btn:hover{background:var(--border);color:var(--text2);}
.icon-btn.del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.card-position{font-size:12px;color:var(--text2);margin-bottom:6px;}
.card-note{font-size:12px;color:var(--text2);line-height:1.5;margin-top:8px;padding:8px 10px;background:var(--surface2);border-radius:6px;border-left:2px solid var(--border2);}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.card-ote{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue);font-weight:500;}
.card-date{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

/* ── LIST TABLE ── */
.list-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);}
.list-table{width:100%;border-collapse:collapse;}
.list-table thead tr{border-bottom:1px solid var(--border);background:var(--surface2);}
.list-table th{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;text-align:left;white-space:nowrap;}
.list-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.list-table tbody tr:last-child{border-bottom:none;}
.list-table tbody tr:hover{background:var(--surface2);}
.list-table td{padding:10px 14px;vertical-align:middle;}
.row-actions{display:flex;gap:5px;opacity:0;transition:opacity .14s;}
.list-table tbody tr:hover .row-actions{opacity:1;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;font-family:'JetBrains Mono',monospace;white-space:nowrap;border:1px solid transparent;}
.badge-sase{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);}
.badge-edr{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.badge-fw{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);}
.badge-jp{background:var(--pink-bg);color:var(--pink);border-color:var(--pink-bd);}
.badge-soc{background:var(--slate-bg);color:var(--slate);border-color:var(--slate-bd);}
.prio-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-family:'Bricolage Grotesque',sans-serif;font-size:11px;font-weight:700;flex-shrink:0;}
.prio-A{background:var(--red-bg);color:var(--red);}
.prio-B{background:var(--amber-bg);color:var(--amber);}
.prio-C{background:var(--slate-bg);color:var(--slate);}
.status-pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid transparent;white-space:nowrap;}
.s-未着手{background:var(--slate-bg);color:var(--slate);border-color:var(--slate-bd);}
.s-検討中,.s-書類応募{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);}
.s-書類通過{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.s-面接中{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);}
.s-最終面接{background:var(--pink-bg);color:var(--pink);border-color:var(--pink-bd);}
.s-内定{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);font-weight:600;}
.s-辞退{background:var(--slate-bg);color:var(--text3);}
.s-不合格{background:var(--red-bg);color:var(--text3);}

/* ── EMPTY ── */
.empty{text-align:center;padding:64px 20px;color:var(--text3);grid-column:1/-1;}
.empty-title{font-size:14px;font-weight:500;margin-bottom:8px;color:var(--text2);}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start;}
.kanban-col{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:12px;min-height:160px;}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.kanban-col-title{font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.kanban-count{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;box-shadow:var(--sh);}
.kanban-card-name{font-weight:600;font-size:13px;margin-bottom:5px;font-family:'Bricolage Grotesque',sans-serif;}
.kanban-card-sub{font-size:11px;color:var(--text3);display:flex;gap:6px;align-items:center;}

/* ── COMPARE ── */
.compare-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.compare-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh);}
.compare-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.compare-card-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;}
.compare-ote{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--blue);margin-bottom:8px;}
.compare-bar-bg{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-bottom:10px;}
.compare-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),#5B9CF6);transition:width .4s;}
.compare-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);}
.compare-row:last-child{border-bottom:none;}
.compare-row-label{color:var(--text3);}

/* ── AGENTS ── */
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh);transition:all .16s;}
.agent-card:hover{box-shadow:var(--shm);border-color:var(--border2);}
.agent-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.agent-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;}
.agent-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;border:1px solid transparent;}
.agent-tag.it{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);}
.agent-tag.general{background:var(--slate-bg);color:var(--slate);border-color:var(--slate-bd);}
.agent-tag.exec{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd);}
.agent-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px;}
.agent-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);text-decoration:none;font-weight:500;padding:5px 12px;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:6px;transition:all .12s;}
.agent-link:hover{background:#dce8fb;}
.agent-add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--surface2);border:1.5px dashed var(--border2);border-radius:var(--rl);cursor:pointer;color:var(--text3);font-size:13px;font-family:'Instrument Sans',sans-serif;transition:all .14s;}
.agent-add-btn:hover{border-color:var(--blue-bd);color:var(--blue);background:var(--blue-bg);}

/* ── CAREER PAGE ── */
.career-page{display:grid;grid-template-columns:1fr 400px;gap:20px;align-items:start;}
/* LEFT: document */
.career-doc{display:flex;flex-direction:column;gap:16px;}
.career-doc-header{display:flex;align-items:center;justify-content:space-between;}
.career-doc-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px;}
.career-doc-subtitle{font-size:13px;color:var(--text2);margin-top:2px;}

/* ROADMAP VISUAL */
.roadmap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;box-shadow:var(--sh);}
.roadmap-title{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:18px;}
.roadmap-steps{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:4px;}
.roadmap-step{flex:1;min-width:140px;position:relative;}
.roadmap-step:not(:last-child)::after{content:'→';position:absolute;right:-14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3);z-index:1;}
.step-box{border-radius:10px;padding:14px 16px;border:1.5px solid var(--border);background:var(--surface2);height:100%;transition:all .14s;margin-right:28px;}
.step-box.active-step{border-color:var(--blue-bd);background:var(--blue-bg);}
.step-box.done-step{border-color:var(--green-bd);background:var(--green-bg);}
.step-phase{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;}
.step-box.active-step .step-phase{color:var(--blue);}
.step-box.done-step .step-phase{color:var(--green);}
.step-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:14px;margin-bottom:4px;}
.step-period{font-size:11px;color:var(--text3);margin-bottom:8px;}
.step-salary{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--blue);}
.step-box.active-step .step-salary{color:var(--blue);}

/* DOC SECTIONS */
.doc-sections{display:flex;flex-direction:column;gap:12px;}
.doc-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);}
.doc-section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2);}
.doc-section-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;}
.doc-section-icon{font-size:14px;}
.doc-section-body{padding:16px 18px;}
.doc-editable{width:100%;border:1.5px solid var(--border);background:var(--surface2);font-family:'Instrument Sans',sans-serif;font-size:13px;color:var(--text);line-height:1.7;resize:none;min-height:80px;outline:none;border-radius:var(--r);padding:10px 12px;transition:border-color .14s;}
.doc-editable:focus{background:var(--surface);border-color:var(--blue);}
.doc-editable::placeholder{color:var(--text3);}
.section-title-input{background:none;border:none;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:14px;color:var(--text);outline:none;flex:1;min-width:0;padding:2px 6px;border-radius:5px;transition:background .12s;}
.section-title-input:hover{background:var(--border);}
.section-title-input:focus{background:var(--surface);border:1.5px solid var(--blue);padding:1px 5px;}

/* RIGHT: AI chat */
.career-chat-panel{position:sticky;top:70px;}
.career-chat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--sh);display:flex;flex-direction:column;height:calc(100vh - 110px);max-height:720px;}
.career-chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.career-chat-htitle{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:14px;}
.career-chat-hsub{font-size:11px;color:var(--text3);margin-top:1px;}
.ai-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ai-dot.thinking{animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.career-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.ai-msg{display:flex;flex-direction:column;gap:3px;max-width:88%;}
.ai-msg.user{align-self:flex-end;align-items:flex-end;}
.ai-msg.ai{align-self:flex-start;align-items:flex-start;}
.ai-bubble{padding:10px 13px;border-radius:12px;font-size:12px;line-height:1.6;}
.ai-msg.user .ai-bubble{background:var(--purple);color:#fff;border-radius:12px 12px 3px 12px;}
.ai-msg.ai .ai-bubble{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:12px 12px 12px 3px;white-space:pre-wrap;}
.ai-bubble.loading{color:var(--text3);font-style:italic;}
.ai-msg-actions{display:flex;gap:5px;margin-top:4px;}
.career-quick-row{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.career-q-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-size:11px;padding:3px 9px;transition:all .12s;font-family:'Instrument Sans',sans-serif;white-space:nowrap;}
.career-q-btn:hover{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd);}
.career-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.career-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:13px;padding:8px 11px;resize:none;max-height:80px;line-height:1.4;}
.career-input:focus{outline:none;border-color:var(--purple);background:var(--surface);}
.career-input::placeholder{color:var(--text3);}
.career-send{background:var(--purple);border:none;border-radius:var(--r);color:#fff;cursor:pointer;font-size:14px;padding:8px 13px;flex-shrink:0;transition:background .14s;}
.career-send:hover{background:#5a2f90;}
.career-send:disabled{background:var(--border2);cursor:not-allowed;}

/* ROADMAP EDIT */
.step-box{cursor:pointer;}
.step-box:hover{box-shadow:var(--shm);border-color:var(--border2);}
.step-status-row{display:flex;gap:6px;margin-top:10px;}
.step-status-btn{flex:1;padding:5px 0;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:11px;font-family:'Instrument Sans',sans-serif;cursor:pointer;font-weight:500;transition:all .12s;color:var(--text2);}
.step-status-btn.sel-active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue);}
.step-status-btn.sel-done{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.step-status-btn.sel-none{background:var(--surface2);border-color:var(--border);color:var(--text2);}
.roadmap-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;min-width:100px;padding:14px 10px;background:var(--surface2);border:1.5px dashed var(--border2);border-radius:10px;cursor:pointer;color:var(--text3);font-size:12px;font-family:'Instrument Sans',sans-serif;transition:all .14s;flex-shrink:0;}
.roadmap-add-btn:hover{border-color:var(--blue-bd);color:var(--blue);background:var(--blue-bg);}

/* COMPANY AI MODAL */
.ai-modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,25,22,.45);backdrop-filter:blur(6px);z-index:200;align-items:flex-end;justify-content:flex-end;padding:24px;}
.ai-modal-overlay.open{display:flex;}
.ai-modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);width:420px;max-width:100%;height:520px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shm);}
.ai-modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ai-modal-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;}
.ai-modal-company{font-size:11px;color:var(--text3);margin-top:2px;}
.ai-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px 6px;border-radius:5px;line-height:1;}
.ai-close:hover{background:var(--border);color:var(--text);}
.ai-messages-c{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.c-ai-msg{display:flex;flex-direction:column;gap:3px;max-width:86%;}
.c-ai-msg.user{align-self:flex-end;align-items:flex-end;}
.c-ai-msg.ai{align-self:flex-start;align-items:flex-start;}
.c-ai-bubble{padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.55;}
.c-ai-msg.user .c-ai-bubble{background:var(--blue);color:#fff;border-radius:12px 12px 3px 12px;}
.c-ai-msg.ai .c-ai-bubble{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:12px 12px 12px 3px;white-space:pre-wrap;}
.c-ai-bubble.loading{color:var(--text3);font-style:italic;}
.ai-quick-row{padding:7px 14px;border-top:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.ai-q-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-size:11px;padding:3px 10px;transition:all .12s;font-family:'Instrument Sans',sans-serif;white-space:nowrap;}
.ai-q-btn:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);}
.ai-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.ai-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:13px;padding:8px 11px;resize:none;max-height:80px;line-height:1.4;}
.ai-input:focus{outline:none;border-color:var(--blue);background:var(--surface);}
.ai-input::placeholder{color:var(--text3);}
.ai-send{background:var(--blue);border:none;border-radius:var(--r);color:#fff;cursor:pointer;font-size:14px;padding:8px 13px;flex-shrink:0;}
.ai-send:hover{background:#1554BB;}
.ai-send:disabled{background:var(--border2);cursor:not-allowed;}

/* TOAST */
.drive-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:20px;font-size:12px;font-weight:500;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.drive-toast.show{opacity:1;}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,25,22,.5);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:26px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shm);}
.modal-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:17px;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.span2{grid-column:span 2;}
label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-family:'JetBrains Mono',monospace;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:13px;padding:9px 12px;transition:border-color .14s;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);background:var(--surface);}
select option{background:var(--surface);}
textarea{resize:vertical;min-height:80px;line-height:1.5;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
</style>
</head>

// ── DRIVE SYNC ─────────────────────────────────────────────
let accessToken=null,driveFileId=null,syncTimeout=null;
function toast(msg,d=2500){const el=document.getElementById('drive-toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),d);}
function setDriveBtn(s){
  const btn=document.getElementById('drive-btn'),dot=document.getElementById('sync-dot'),lbl=document.getElementById('drive-btn-label');
  btn.className='btn-drive';dot.className='sync-dot';
  if(s==='connected'){btn.classList.add('connected');lbl.textContent='同期済み ✓';}
  else if(s==='syncing'){btn.classList.add('syncing');dot.classList.add('spin');lbl.textContent='同期中...';}
  else if(s==='error'){lbl.textContent='同期エラー — 再試行';}
  else{lbl.textContent='Googleでログイン';}
}
function handleDriveBtn(){if(accessToken)syncToDrive();else loginGoogle();}
function loginGoogle(){
  const c=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:async(res)=>{
    if(res.error){toast('ログイン失敗: '+res.error);return;}
    accessToken=res.access_token;setDriveBtn('syncing');toast('ログイン成功！読み込み中...');await loadFromDrive();
  }});
  c.requestAccessToken();
}
async function findDriveFile(){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id)`,{headers:{Authorization:`Bearer ${accessToken}`}});
  const d=await r.json();return d.files?.length?d.files[0].id:null;
}
async function loadFromDrive(){
  try{
    driveFileId=await findDriveFile();
    if(driveFileId){
      const r=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{headers:{Authorization:`Bearer ${accessToken}`}});
      const d=await r.json();
      if(d.companies){
        companies=d.companies;agents=d.agents||agents;profile=d.profile||profile;
        roadmap=d.roadmap||roadmap;sections=d.sections||sections;
        nextId=d.nextId||nextId;nextAgentId=d.nextAgentId||nextAgentId;
        saveLocal();renderAll();toast('✓ Driveから読み込みました');
      }
    }else{await syncToDrive();toast('✓ Driveに初回保存しました');}
    setDriveBtn('connected');
  }catch(e){toast('エラー: '+e.message);setDriveBtn('error');}
}
async function syncToDrive(){
  if(!accessToken)return;setDriveBtn('syncing');
  try{
    const body=JSON.stringify({companies,agents,profile,roadmap,sections,nextId,nextAgentId});
    if(driveFileId){
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body});
    }else{
      const m=await(await fetch('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({name:FILE_NAME,parents:['appDataFolder']})})).json();
      driveFileId=m.id;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body});
    }
    setDriveBtn('connected');
  }catch(e){toast('同期エラー: '+e.message);setDriveBtn('error');}
}
function saveData(){saveLocal();if(accessToken){clearTimeout(syncTimeout);syncTimeout=setTimeout(syncToDrive,1000);}}

function updateSection(id,val){const s=sections.find(x=>x.id===id);if(s)s.content=val;}
function updateSectionTitle(id,val){const s=sections.find(x=>x.id===id);if(s)s.title=val;}
function autoResize(el){el.style.height='auto';el.style.height=Math.max(80,el.scrollHeight)+'px';}
const ICONS=['🎯','📋','💪','📚','💡','🚀','⭐','📊','🔑','📝','🗺','🏆','💼','🔥','✅'];
function cycleIcon(id){
  const s=sections.find(x=>x.id===id);if(!s)return;
  const cur=ICONS.indexOf(s.icon);
  s.icon=ICONS[(cur+1)%ICONS.length];
  saveData();renderCareerDoc();
}
function deleteSection(id){if(!confirm('このセクションを削除しますか？'))return;sections=sections.filter(s=>s.id!==id);saveData();renderCareerDoc();}
function addSection(){
  const title=prompt('セクション名を入力してください（例：面接対策）');
  if(!title)return;
  const icons=['📝','🔑','⭐','🚀','💡','📊'];
  sections.push({id:'s'+Date.now(),icon:icons[Math.floor(Math.random()*icons.length)],title,content:''});
  saveData();renderCareerDoc();
}

let editRoadmapIdx=null;
let rmStatus='';

function openRoadmapModal(idx){
  editRoadmapIdx=idx;
  const step=roadmap[idx];
  document.getElementById('rm-phase').value=step.phase||'';
  document.getElementById('rm-title').value=step.title||'';
  document.getElementById('rm-period').value=step.period||'';
  document.getElementById('rm-salary').value=step.salary||'';
  selectRmStatus(step.status||'');
  document.getElementById('roadmap-modal-overlay').classList.add('open');
}
function closeRoadmapModal(){document.getElementById('roadmap-modal-overlay').classList.remove('open');editRoadmapIdx=null;}
function selectRmStatus(s){
  rmStatus=s;
  document.getElementById('rsb-none').className='step-status-btn'+(s===''?' sel-none':'');
  document.getElementById('rsb-active').className='step-status-btn'+(s==='active'?' sel-active':'');
  document.getElementById('rsb-done').className='step-status-btn'+(s==='done'?' sel-done':'');
}
function saveRoadmapStep(){
  if(editRoadmapIdx===null)return;
  roadmap[editRoadmapIdx]={
    phase:document.getElementById('rm-phase').value.trim(),
    title:document.getElementById('rm-title').value.trim(),
    period:document.getElementById('rm-period').value.trim(),
    salary:document.getElementById('rm-salary').value.trim(),
    status:rmStatus
  };
  closeRoadmapModal();saveData();renderCareerDoc();
}
function deleteRoadmapStep(){
  if(editRoadmapIdx===null)return;
  if(roadmap.length<=1){toast('ステップは最低1つ必要です');return;}
  if(!confirm('このステップを削除しますか？'))return;
  roadmap.splice(editRoadmapIdx,1);
  closeRoadmapModal();saveData();renderCareerDoc();
}
function addRoadmapStep(){
  roadmap.push({phase:'Phase '+(roadmap.length),title:'新しいステップ',period:'—',salary:'—',status:''});
  saveData();renderCareerDoc();
  // 追加したステップを即編集
  setTimeout(()=>openRoadmapModal(roadmap.length-1),50);
}

// ── STATS ──────────────────────────────────────────────────
function updateStats(){
  document.getElementById('stat-total').textContent=companies.length;
  document.getElementById('stat-active').textContent=companies.filter(c=>['書類応募','書類通過'].includes(c.status)).length;
  document.getElementById('stat-interview').textContent=companies.filter(c=>['面接中','最終面接'].includes(c.status)).length;
  document.getElementById('stat-offer').textContent=companies.filter(c=>c.status==='内定').length;
  document.getElementById('nav-count').textContent=companies.length+' 社';
}

// ── COMPANY EDIT ───────────────────────────────────────────
let editId=null;
function openAddModal(){
  editId=null;document.getElementById('modal-title').textContent='企業を追加';
  ['name','position','ote','date','note'].forEach(k=>document.getElementById('f-'+k).value='');
  document.getElementById('f-cat').value='外資SASE';document.getElementById('f-prio').value='A';
  document.getElementById('f-status').value='未着手';document.getElementById('f-route').value='';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),60);
}
function openEditModal(id){
  const c=companies.find(x=>x.id===id);if(!c)return;
  editId=id;document.getElementById('modal-title').textContent='企業を編集';
  document.getElementById('f-name').value=c.name;document.getElementById('f-cat').value=c.cat;
  document.getElementById('f-prio').value=c.prio;document.getElementById('f-position').value=c.position||'';
  document.getElementById('f-status').value=c.status;document.getElementById('f-ote').value=c.ote||'';
  document.getElementById('f-date').value=c.date||'';document.getElementById('f-route').value=c.route||'';
  document.getElementById('f-note').value=c.note||'';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalIfBg(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function saveCompany(){
  const name=document.getElementById('f-name').value.trim();if(!name){document.getElementById('f-name').focus();return;}
  const data={name,cat:document.getElementById('f-cat').value,prio:document.getElementById('f-prio').value,position:document.getElementById('f-position').value.trim(),status:document.getElementById('f-status').value,ote:document.getElementById('f-ote').value.trim(),date:document.getElementById('f-date').value,route:document.getElementById('f-route').value,note:document.getElementById('f-note').value.trim()};
  if(editId){const idx=companies.findIndex(c=>c.id===editId);companies[idx]={...companies[idx],...data};}
  else companies.push({id:nextId++,...data});
  closeModal();saveData();renderAll();
}
function deleteCompany(id){if(!confirm('削除しますか？'))return;companies=companies.filter(c=>c.id!==id);saveData();renderAll();}

// ── AGENT ──────────────────────────────────────────────────
function openAgentModal(){
  ['ag-name','ag-url','ag-note'].forEach(k=>document.getElementById(k).value='');
  document.getElementById('ag-tag').value='it';
  document.getElementById('agent-modal-overlay').classList.add('open');
}
function closeAgentModal(){document.getElementById('agent-modal-overlay').classList.remove('open');}
function saveAgent(){
  const name=document.getElementById('ag-name').value.trim();if(!name)return;
  agents.push({id:nextAgentId++,name,url:document.getElementById('ag-url').value.trim(),tag:document.getElementById('ag-tag').value,note:document.getElementById('ag-note').value.trim()});
  closeAgentModal();saveData();renderAgents();
}
function deleteAgent(id){if(!confirm('削除しますか？'))return;agents=agents.filter(a=>a.id!==id);saveData();renderAgents();}

// ── PROFILE ────────────────────────────────────────────────
function openProfileModal(){
  document.getElementById('pm-current').value=profile.current||'';
  document.getElementById('pm-goal').value=profile.goal||'';
  document.getElementById('pm-timeline').value=profile.timeline||'';
  document.getElementById('pm-strength').value=profile.strength||'';
  document.getElementById('profile-modal-overlay').classList.add('open');
}
function closeProfileModal(){document.getElementById('profile-modal-overlay').classList.remove('open');}
function saveProfile(){
  profile={current:document.getElementById('pm-current').value.trim(),goal:document.getElementById('pm-goal').value.trim(),timeline:document.getElementById('pm-timeline').value.trim(),strength:document.getElementById('pm-strength').value.trim()};
  closeProfileModal();saveData();renderCareerDoc();

// ── COMPANY AI ─────────────────────────────────────────────
let aiCompanyId=null,aiHistory={},aiLoading=false;
const QUICK_Q=['面接で聞かれそうな質問は？','SE経験をどうアピールする？','この会社の選考フローは？','競合との違いを教えて','年収交渉のコツは？'];
function openAI(id){
  aiCompanyId=id;const c=companies.find(x=>x.id===id);if(!c)return;
  document.getElementById('ai-modal-company').textContent=c.name;
  document.getElementById('ai-modal-overlay').classList.add('open');
  if(!aiHistory[id]){aiHistory[id]=[];addAIMsg('ai',`${c.name}について何でも聞いてください！`);}
  else renderAIMsgs();
  document.getElementById('ai-quick-row').innerHTML=QUICK_Q.map(q=>`<button class="ai-q-btn" onclick="sendQuick('${q.replace(/'/g,"\\'")}')">${esc(q)}</button>`).join('');
  document.getElementById('ai-input').focus();
}
function closeAI(){document.getElementById('ai-modal-overlay').classList.remove('open');}
function sendQuick(q){document.getElementById('ai-input').value=q;sendAI();}
function addAIMsg(role,content){if(!aiHistory[aiCompanyId])aiHistory[aiCompanyId]=[];aiHistory[aiCompanyId].push({role,content});renderAIMsgs();}
function renderAIMsgs(){
  const msgs=aiHistory[aiCompanyId]||[];
  document.getElementById('ai-messages').innerHTML=msgs.map(m=>`<div class="c-ai-msg ${m.role==='user'?'user':'ai'}"><div class="c-ai-bubble ${m.content==='…'?'loading':''}">${esc(m.content)}</div></div>`).join('');
  document.getElementById('ai-messages').scrollTop=99999;
}
async function sendAI(){
  if(aiLoading)return;
  const input=document.getElementById('ai-input');const q=input.value.trim();if(!q)return;
  const c=companies.find(x=>x.id===aiCompanyId);if(!c)return;
  input.value='';input.style.height='auto';
  addAIMsg('user',q);aiLoading=true;
  document.getElementById('ai-send-btn').disabled=true;
  document.getElementById('ai-dot').classList.add('thinking');
  addAIMsg('ai','…');
  const sys=`あなたはSASEセキュリティ分野の外資系セールス転職に詳しいキャリアアドバイザーです。
対象企業: ${c.name} / カテゴリ: ${c.cat} / ポジション: ${c.position||'未設定'} / OTE: ${c.ote||'未設定'}万
SE→AEへのキャリアチェンジを目指すユーザーに、具体的で実践的なアドバイスを日本語200〜400文字で回答してください。`;
  const history=(aiHistory[aiCompanyId]||[]).filter(m=>m.content!=='…').slice(-8);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:history.map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}))})});
    const data=await res.json();
    aiHistory[aiCompanyId].splice(-1,1,{role:'ai',content:data?.content?.[0]?.text||'エラーが発生しました。'});
  }catch(e){aiHistory[aiCompanyId].splice(-1,1,{role:'ai',content:'ネットワークエラーが発生しました。'});}
  aiLoading=false;document.getElementById('ai-send-btn').disabled=false;
  document.getElementById('ai-dot').classList.remove('thinking');renderAIMsgs();
}

// ── CAREER AI ──────────────────────────────────────────────
let careerHistory=[],careerLoading=false;
const CAREER_Q=['現状を整理してロードマップを提案して','SE経験をどうビジネス価値に変換する？','最初に受けるべき企業はどこ？','面接対策のポイントを教えて','スキルアップのための優先順位は？'];

function initCareerPage(){
  document.getElementById('career-quick-row').innerHTML=CAREER_Q.map(q=>`<button class="career-q-btn" onclick="sendCareerQuick('${q.replace(/'/g,"\\'")}')">${esc(q)}</button>`).join('');
  if(careerHistory.length===0){
    addCareerMsg('ai',`こんにちは！\n\n左のドキュメントがあなたのキャリアパスの「本体」です。AIとの相談内容を反映して、自分だけのキャリアマップを作り上げましょう。\n\nまず「現状を整理してロードマップを提案して」から始めてみてください。提案が気に入ったら「ドキュメントに反映」ボタンで左に追加できます。`);
  }else renderCareerMsgs();
  renderCareerDoc();
}

function addCareerMsg(role,content,adoptable=false){
  careerHistory.push({role,content,adoptable});renderCareerMsgs();
}
function renderCareerMsgs(){
  document.getElementById('career-messages').innerHTML=careerHistory.map((m,i)=>`
    <div class="ai-msg ${m.role==='user'?'user':'ai'}">
      <div class="ai-bubble ${m.content==='…'?'loading':''}">${esc(m.content)}</div>
      ${m.adoptable&&m.role==='ai'&&m.content!=='…'?`
        <div class="ai-msg-actions">
          <button class="btn-adopt" onclick="adoptToDoc(${i})">＋ ドキュメントに反映</button>
        </div>`:''
      }
    </div>`).join('');
  document.getElementById('career-messages').scrollTop=99999;
}

function adoptToDoc(idx){
  const msg=careerHistory[idx];if(!msg)return;
  const title=prompt('このセクションのタイトルを入力してください：','AIの提案');
  if(!title)return;
  const icons=['💡','📋','🎯','🚀','⭐','📝'];
  sections.push({id:'s'+Date.now(),icon:icons[Math.floor(Math.random()*icons.length)],title,content:msg.content});
  saveData();renderCareerDoc();
  toast('✓ ドキュメントに追加しました');
  // スクロールをドキュメント側へ
  document.getElementById('doc-sections').scrollIntoView({behavior:'smooth',block:'end'});
}

function sendCareerQuick(q){document.getElementById('career-input').value=q;sendCareerAI();}

async function sendCareerAI(){
  if(careerLoading)return;
  const input=document.getElementById('career-input');const q=input.value.trim();if(!q)return;
  input.value='';input.style.height='auto';
  addCareerMsg('user',q,false);careerLoading=true;
  document.getElementById('career-send-btn').disabled=true;
  document.getElementById('career-dot').style.animation='pulse 1s ease-in-out infinite';
  addCareerMsg('ai','…',false);

  const companyNames=companies.slice(0,6).map(c=>c.name).join('、');
  const currentSections=sections.map(s=>`【${s.title}】\n${s.content}`).join('\n\n');

  const sys=`あなたはSASEセキュリティ分野の転職・キャリアコンサルタントです。

【ユーザープロフィール】
現職: ${profile.current}
目標: ${profile.goal}
転職時軸: ${profile.timeline}
強み: ${profile.strength}
検討中の企業: ${companyNames}

【現在のキャリアパスドキュメント】
${currentSections}

ユーザーのキャリアパスドキュメント作成を補助するアドバイザーとして、具体的・実践的なアドバイスを提供してください。
会話の文脈を踏まえて継続的にサポートし、必要に応じてドキュメントに追加できるような構造化されたコンテンツも提案してください。
回答は400〜800文字で、見やすく整理して日本語で回答してください。`;

  const history=careerHistory.filter(m=>m.content!=='…').slice(-12);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,messages:history.map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}))})});
    const data=await res.json();
    const text=data?.content?.[0]?.text||'エラーが発生しました。';
    careerHistory.splice(-1,1,{role:'ai',content:text,adoptable:true});
  }catch(e){careerHistory.splice(-1,1,{role:'ai',content:'ネットワークエラーが発生しました。',adoptable:false});}
  careerLoading=false;document.getElementById('career-send-btn').disabled=false;
  document.getElementById('career-dot').style.animation='';renderCareerMsgs();
}

// ── TABS ───────────────────────────────────────────────────
function switchTab(tab,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  el.classList.add('active');
  if(tab==='career')initCareerPage();
  else renderAll();
}
function renderAll(){updateStats();renderList();renderKanban();renderCompare();renderAgents();}
renderAll();
</script>
